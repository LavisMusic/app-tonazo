<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonazo Screen - EN VIVO</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="registro-pantalla" class="pantalla-intro">
    <div class="caja-login">
        <p>Coloca tu usuario de TikTok o Instagram 🔥</p>
        <input type="text" id="username-input" placeholder="@tonazooo">
        <button id="btn-ingresar">INGRESAR AL EVENTO</button>
    </div>
</div>

  <div id="pantalla-principal" style="display: none;" class="pantalla-dashboard">
    
    <div class="columna-izquierda">
      <div class="caja-envio">
        <textarea id="mensaje-input" placeholder="No funes a nadie..."></textarea>
        <div class="botones-accion">
          <button id="btn-adjuntar" >📎 Adjuntar</button>
          <button id="btn-enviar">Enviar a la cola</button>
        </div>
      </div>

      <div class="caja-playlist">
        <h3>En cola...</h3>
        <ul id="lista-mensajes">
          </ul>
      </div>
    </div>

    <div class="columna-derecha">
      <div class="caja-reproductor">
        
        <div class="header-reproductor">
          <span class="punto-rojo"></span> EN VIVO
          <span id="reproductor-usuario" class="reproductor-usuario">@nadie</span>
          </div>

        <div id="reproductor-contenido" class="reproductor-contenido">
          <h2 class="mensaje-vacio">Esperando el próximo mensaje...</h2>
        </div>

        <div class="barra-progreso-contenedor">
          <div id="barra-progreso" class="barra-progreso"></div>
        </div>

      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // CONFIGURACIÓN DE PANTALLA DE USUARIOS
    // ==========================================
    const supabaseUrl = 'https://dnuqekwfbzyqwlcslmyi.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRudXFla3dmYnp5cXdsY3NsbXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNDE5MDcsImV4cCI6MjA5ODYxNzkwN30.MVcWZ9pBH93igxUkaUj5uT-mGKD63dPRBEhvOqwo7wg'; 
    const clienteSupabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    const btnIngresar = document.getElementById('btn-ingresar');
    const usernameInput = document.getElementById('username-input');
    const btnEnviar = document.getElementById('btn-enviar');
    const btnAdjuntar = document.getElementById('btn-adjuntar');
    const mensajeInput = document.getElementById('mensaje-input');
    const listaMensajes = document.getElementById('lista-mensajes');
    const reproductorUsuario = document.getElementById('reproductor-usuario');
    const reproductorContenido = document.getElementById('reproductor-contenido');
    const barraProgreso = document.getElementById('barra-progreso');

    let archivoSeleccionado = null;
    let colaReproduccion = [];
    let estaReproduciendo = false;
    const TIEMPO_REPRODUCCION_MS = 30000;
    let timeoutReproduccion = null;

    const selectorArchivos = document.createElement('input');
    selectorArchivos.type = 'file';
    selectorArchivos.accept = 'image/*,video/*';
    selectorArchivos.style.display = 'none';
    document.body.appendChild(selectorArchivos);

    // Filtro anti-trolls local también
    const PALABRAS_BANEADAS = ['mierda', 'carajo', 'pendejo', 'troll', 'estafa'];
    function filtrarTexto(texto) {
      if (!texto) return texto;
      let textoLimpio = texto;
      PALABRAS_BANEADAS.forEach(palabra => {
        const regex = new RegExp(palabra, 'gi');
        textoLimpio = textoLimpio.replace(regex, '***');
      });
      return textoLimpio;
    }

    // Registro
    btnIngresar.addEventListener('click', async () => {
      let nombreUsuario = usernameInput.value.trim();
      if (nombreUsuario) {
        if (!nombreUsuario.startsWith('@')) nombreUsuario = '@' + nombreUsuario;
        btnIngresar.textContent = 'Ingresando...';
        const { data, error } = await clienteSupabase.from('users').insert([{ username: nombreUsuario }]).select();
        if (!error) {
          sessionStorage.setItem('userId', data[0].id);
          sessionStorage.setItem('username', data[0].username);
          document.getElementById('registro-pantalla').style.display = 'none';
          document.getElementById('pantalla-principal').style.display = 'flex';
        }
      }
    });

    btnAdjuntar.addEventListener('click', () => selectorArchivos.click());
    selectorArchivos.addEventListener('change', () => {
      if (selectorArchivos.files.length > 0) {
        archivoSeleccionado = selectorArchivos.files[0];
        btnAdjuntar.textContent = `✅ Cargado`;
        btnAdjuntar.style.borderColor = '#00d2ff';
        btnAdjuntar.style.color = '#00d2ff';
      }
    });

    // Envío desde celular/pantalla de usuario
    btnEnviar.addEventListener('click', async () => {
      let textoMensaje = mensajeInput.value.trim();
      const usuarioId = sessionStorage.getItem('userId');
      if (!textoMensaje && !archivoSeleccionado) return;

      textoMensaje = filtrarTexto(textoMensaje);
      btnEnviar.textContent = 'Subiendo...';
      btnEnviar.disabled = true;

      let urlDelArchivo = null;
      let tipoDeArchivo = 'text';

      if (archivoSeleccionado) {
        tipoDeArchivo = archivoSeleccionado.type.startsWith('video/') ? 'video' : 'image';
        const nombreUnico = `${Date.now()}_${archivoSeleccionado.name}`;
        const { error: uploadError } = await clienteSupabase.storage.from('multimedia-tonazo').upload(nombreUnico, archivoSeleccionado);
        if (!uploadError) {
          const { data: urlData } = clienteSupabase.storage.from('multimedia-tonazo').getPublicUrl(nombreUnico);
          urlDelArchivo = urlData.publicUrl;
        }
      }

      await clienteSupabase.from('messages').insert([{ content: textoMensaje || null, user_id: usuarioId, file_url: urlDelArchivo, file_type: tipoDeArchivo, status: 'pendiente' }]);
      mensajeInput.value = '';
      archivoSeleccionado = null;
      btnAdjuntar.textContent = '📎 Adjuntar';
      btnAdjuntar.style.borderColor = '#ff1493';
      btnAdjuntar.style.color = '#ff1493';
      btnEnviar.textContent = 'Enviar a la cola';
      btnEnviar.disabled = false;
    });

    // Escuchador Realtime para actualizar la lista de espera de los usuarios
    clienteSupabase
      .channel('cambios-en-tablas')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
        const nuevoMsg = payload.new;
        const { data: userData } = await clienteSupabase.from('users').select('username').eq('id', nuevoMsg.user_id).single();
        const nombreDelEmisor = userData ? userData.username : '@anonimo';

        const nuevaFila = document.createElement('li');
        nuevaFila.className = 'item-playlist';
        nuevaFila.innerHTML = `<span class="item-username">${nombreDelEmisor}</span><span class="badge-tipo">${nuevoMsg.file_type.toUpperCase()}</span>`;
        listaMensajes.appendChild(nuevaFila);

        colaReproduccion.push({
          usuario: nombreDelEmisor,
          texto: nuevoMsg.content,
          tipo: nuevoMsg.file_type,
          url: nuevoMsg.file_url,
          elementoLista: nuevaFila
        });

        if (!estaReproduciendo) {
          reproducirSiguiente();
        }
      })
      .subscribe();

    // Motor de reproducción sincronizado
    function reproducirSiguiente() {
      clearTimeout(timeoutReproduccion);

      if (colaReproduccion.length === 0) {
        estaReproduciendo = false;
        reproductorUsuario.textContent = '@nadie';
        reproductorContenido.innerHTML = '<h2 class="mensaje-vacio">Esperando el próximo mensaje...</h2>';
        barraProgreso.style.transition = 'none';
        barraProgreso.style.width = '0%';
        return;
      }

      estaReproduciendo = true;
      const itemActual = colaReproduccion.shift();
      
      if (listaMensajes.contains(itemActual.elementoLista)) {
        listaMensajes.removeChild(itemActual.elementoLista);
      }

      reproductorUsuario.textContent = itemActual.usuario;

      let htmlContenido = '';
      if (itemActual.texto) htmlContenido += `<div class="texto-reproduccion">${itemActual.texto}</div>`;
      if (itemActual.tipo === 'image') htmlContenido += `<img src="${itemActual.url}" class="media-reproduccion">`;
      if (itemActual.tipo === 'video') htmlContenido += `<video src="${itemActual.url}" class="media-reproduccion" autoplay muted loop></video>`;

      reproductorContenido.innerHTML = `<div class="animar-entrada">${htmlContenido}</div>`;

      barraProgreso.style.transition = 'none';
      barraProgreso.style.width = '0%';
      setTimeout(() => {
        barraProgreso.style.transition = `width ${TIEMPO_REPRODUCCION_MS}ms linear`;
        barraProgreso.style.width = '100%';
      }, 50);

      timeoutReproduccion = setTimeout(() => {
        reproducirSiguiente();
      }, TIEMPO_REPRODUCCION_MS);
    }

    // ESCUCHAR LA ORDEN DE CORTE DEL ADMINISTRADOR
    const canalBroadcast = clienteSupabase.channel('canal-proyeccion');
    canalBroadcast
      .on('broadcast', { event: 'admin-cortar' }, () => {
        console.log("El administrador ha cortado este mensaje.");
        reproducirSiguiente(); // Fuerza el salto inmediato en la pantalla de invitados
      })
      .subscribe();
  </script>
</body>
</html>
