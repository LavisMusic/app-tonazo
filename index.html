<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla del Evento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="registro-pantalla" class="pantalla-intro">
    <div class="caja-login">
        <p>Ingresa tu usuario de TikTok o de Instagram 🔥</p>
        <input type="text" id="username-input" placeholder="Tu nombre...">
        <button id="btn-ingresar">ENTRAR A TONAZO</button>
    </div>
  </div>

  <div id="pantalla-principal" style="display: none;" class="pantalla-dashboard">
    <div class="columna-izquierda">
      <div class="caja-envio">
        <textarea id="mensaje-input" placeholder="Escribe tu mensaje..."></textarea>
        <button id="btn-enviar">ENVIAR MENSAJE</button>
      </div>
    </div>

    <div class="columna-derecha">
      <div class="caja-reproductor">
        <div class="header-reproductor">
          <span id="reproductor-usuario">@nadie</span>
        </div>
        <div id="reproductor-contenido">
          <h2 class="mensaje-vacio">Esperando el próximo mensaje...</h2>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
